<!-- The first two lines of any HTML file serve as the document's "introduction" to the browser. -->
<!doctype html>
<html lang="en">
  <head>
    <!-- sets the page title that appears in the browser tab and search results -->
    <title>Rohit's Blog</title>
    <!-- set UTF-8 character encoding for proper text display worldwide -->
    <meta charset="UTF-8" />
    <!-- ensures compatibility with the modern versions of Internet Explorer -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- configures responsive design by setting the viewport to match device width 
     and controls the initial zoom level to display content at Natural size -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" type="text/css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div id="app">Loading...</div>

    <template id="login">
      <h1>Rohit's Blog</h1>
      <section>
        <h2>Login</h2>
        <!-- Adds novalidate to handle validation with JavaScript instead of browser defaults -->
        <form id="loginForm" action="javascript:login()">
          <div class="form-group">
            <label for="username">Username</label>
            <input id="username" name="user" type="text" required 
                  autocomplete="username" placeholder="Enter your username">
          </div>
          <!-- This is where error messages will appear -->
          <div id="loginError" role="alert"></div>
          <button type="submit">Login</button>
        </form>
        <hr/>
        <h2>Register</h2>
        <form id="registerForm" method="POST" novalidate>
        <div class="form-group">
          <label for="user">Username <span class="required">*</span></label>
          <input id="user" name="user" type="text" required 
                minlength="3" maxlength="20" 
                pattern="[a-zA-Z0-9_]+" 
                autocomplete="username"
                title="Username must be 3-20 characters, letters, numbers, and underscores only">
          <small class="form-text">Choose a unique username (3-20 characters)</small>
        </div>
        
        <div class="form-group">
          <label for="currency">Currency <span class="required">*</span></label>
          <input id="currency" name="currency" type="text" required 
                value="$" maxlength="3" 
                pattern="[A-Z$€£¥₹]+" 
                title="Enter a valid currency symbol or code">
          <small class="form-text">Currency symbol (e.g., $, €, £)</small>
        </div>
        
        <div class="form-group">
          <label for="description">Account Description</label>
          <input id="description" name="description" type="text" 
                maxlength="100" 
                placeholder="Personal savings, checking, etc.">
          <small class="form-text">Optional description (up to 100 characters)</small>
        </div>
        
        <div class="form-group">
          <label for="balance">Starting Balance</label>
          <input id="balance" name="balance" type="number" 
                value="0" min="0" step="0.01" 
                title="Enter a positive number for your starting balance">
          <small class="form-text">Initial account balance (minimum $0.00)</small>
        </div>
        <div id="registerError" role="alert"></div>
        <button type="submit">Create Account</button>
      </form>
      </section>
    </template>

    <template id="dashboard">
      <header>
        <h1>Welcome To Rohit's Blog</h1>
        <a href="/login" onclick="onLinkClick(event)">Logout</a>
      </header>
      <section>
        Balance: <span id="balance"></span><span id="currency"></span>
      </section>
      <h2 id="description"></h2>
      <section>
        <h2>Transactions</h2>
        <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Object</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="transactions"></tbody>
    </table>
      </section>
    </template>

    <template id="transaction">
      <tr>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </template>
</html>
