<!-- The first two lines of any HTML file serve as the document's "introduction" to the browser. -->
<!doctype html>
<html lang="en">
  <head>
    <!-- sets the page title that appears in the browser tab and search results -->
    <title>Rohit's Blog</title>
    <!-- set UTF-8 character encoding for proper text display worldwide -->
    <meta charset="UTF-8" />
    <!-- ensures compatibility with the modern versions of Internet Explorer -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- configures responsive design by setting the viewport to match device width 
     and controls the initial zoom level to display content at Natural size -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="layout.css" type="text/css" />
  </head>
  <body>
    <div class="container">
      <div class="item1">One</div>
      <div class="item2">Two</div>
      <div class="item3">Three</div>
      <div class="item4">Fours</div>
    </div>
  </body>
</html>
