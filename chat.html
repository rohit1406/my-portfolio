<!-- The first two lines of any HTML file serve as the document's "introduction" to the browser.
 It tells the browser this is modern HTML5. -->
<!doctype html>
<!-- Specifies the page language for screen readers and translation tools -->
<html lang="en">
  <head>
    <!-- sets the page title that appears in the browser tab and search results -->
    <title>AI Chat Assistant</title>
    <!-- set UTF-8 character encoding for proper text display worldwide -->
    <meta charset="UTF-8" />
    <!-- ensures compatibility with the modern versions of Internet Explorer -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- configures responsive design by setting the viewport to match device width 
     and controls the initial zoom level to display content at Natural size -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="chat.css" type="text/css" />
    <script src="./chat.js" defer></script>
  </head>
  <body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>AI Chat Assistant</h1>
            <p>Ask me anything!</p>
        </header>

        <!-- role="log": Tells screen readers this area contains a chronological log of messages
         aria-live="polite": Announces new messages to screen readers without interrupting -->
        <main class="chat-messages" id="messages" role="log" aria-live="polite">
            <!-- Messages will be dynamically added here -->
        </main>

        <form class="chat-form" id="chatForm">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your message here..." aria-label="Chat message input" required />
                <button type="submit" id="sendBtn" aria-label="Send message">Send</button>
            </div>
        </form>
    </div>
  </body>
</html>
